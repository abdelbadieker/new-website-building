<div style="background-color: #07101f; padding: 40px 20px; font-family: sans-serif; text-align: center;">
  <div style="max-width: 500px; margin: 0 auto; background-color: #0a1628; border: 1px solid #1e3a8a; border-radius: 12px; padding: 40px; text-align: left; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
    <h1 style="color: #ffffff; font-weight: 800; font-size: 26px; margin-top: 0; margin-bottom: 20px;">Eco<span style="color: #2563EB;">Mate</span></h1>
    <h2 style="color: #ffffff; font-size: 20px; margin-top: 0;">Reset your password</h2>
    <p style="color: #94a3b8; font-size: 15px; line-height: 1.6;">
      We received a request to reset the password for your account. If you made this request, please click the button below to securely update your password.
    </p>
    <div style="margin: 30px 0;">
      <a href="{{ .ConfirmationURL }}" style="display: inline-block; background-color: #10b981; color: #ffffff; text-decoration: none; font-weight: bold; font-size: 15px; padding: 14px 28px; border-radius: 8px;">Reset Password</a>
    </div>
    <hr style="border: none; border-top: 1px solid #1e293b; margin: 30px 0;" />
    <p style="color: #475569; font-size: 12px; margin: 0; line-height: 1.5;">
      If you didn't request a password reset, you can safely ignore this email.<br/>© 2026 EcoMate
    </p>
  </div>
</div>
