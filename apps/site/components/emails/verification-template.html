<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body {
      background-color: #07101f;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .wrapper {
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      background-color: #07101f;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 30px;
      letter-spacing: -0.5px;
    }
    .logo-gradient {
      color: #10B981;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 15px;
      color: #ffffff;
    }
    .text {
      font-size: 15px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 30px;
    }
    .otp-box {
      background-color: rgba(0, 0, 0, 0.3);
      border: 1px dashed rgba(37, 99, 235, 0.5);
      border-radius: 12px;
      padding: 20px;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 6px;
      color: #10B981;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #2563EB, #10B981);
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      padding: 14px 28px;
      border-radius: 8px;
      margin-bottom: 30px;
    }
    .footer {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="logo">Eco<span class="logo-gradient">Mate</span></div>
      <div class="title">Verify your email</div>
      <div class="text">
        Welcome to EcoMate! To complete your registration and start your 14-day free trial, please verify your email address.
      </div>
      
      <!-- Supabase magic link / OTP substitution -->
      <!-- If you use OTP tokens, use the otp-box: -->
      <!-- <div class="otp-box">{{ .Token }}</div> -->
      
      <!-- Or use the standard confirmation link button: -->
      <a href="{{ .ConfirmationURL }}" class="btn">Verify Email Address</a>
      
      <div class="footer">
        If you didn't request this email, there's nothing to worry about — you can safely ignore it.
        <br><br>
        © 2026 EcoMate. All rights reserved.
      </div>
    </div>
  </div>
</body>
</html>
